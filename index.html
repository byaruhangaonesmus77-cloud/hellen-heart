<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I LOVE YOU Heart Motion</title>
  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .heart-container {
      position: relative;
      width: 400px;
      height: 400px;
      animation: pulse 3s infinite ease-in-out;
    }

    .heart-image {
      width: 400px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 30px red;
    }

    /* Rotating “I LOVE YOU” text around the heart */
    .orbit-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: cursive;
      font-size: 22px;
      color: red;
      text-shadow: 2px 2px 10px pink;
      animation: rotateText 10s linear infinite;
    }

    @keyframes rotateText {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .caption {
      position: absolute;
      bottom: -60px;
      width: 100%;
      text-align: center;
      font-family: cursive;
      font-size: 28px;
      color: white;
      text-shadow: 2px 2px 10px red;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 2px 2px 10px red; }
      to { text-shadow: 2px 2px 20px pink; }
    }
  </style>
</head>
<body>
  <div class="heart-container">
    <img src="https://copilot.microsoft.com/th/id/BCO.87409bb6-55e6-47fe-8677-57223d58692a.png" alt="Heart of Love" class="heart-image">
    <div class="orbit-text">💞 I LOVE YOU 💞 I LOVE YOU 💞 I LOVE YOU 💞</div>
    <div class="caption">Forever Yours, MAMITO HELLEN 💖</div>
  </div>
</body>
</html>
