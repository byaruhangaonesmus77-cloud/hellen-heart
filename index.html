<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I Love You Heart for MAMITO HELLEN</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 400px;
      height: 400px;
    }

    .love {
      position: absolute;
      font-size: 28px;
      font-family: cursive;
      color: red;
      opacity: 0;
      animation: floatIn 4s forwards;
    }

    /* Position "I LOVE YOU" around heart shape */
    .love.top-left { top: 40px; left: 40px; animation-delay: 0s; }
    .love.top-right { top: 40px; right: 40px; animation-delay: 1s; }
    .love.bottom-left { bottom: 40px; left: 40px; animation-delay: 2s; }
    .love.bottom-right { bottom: 40px; right: 40px; animation-delay: 3s; }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      font-family: cursive;
      color: white;
      text-shadow: 2px 2px 6px red;
      opacity: 0;
      animation: fadeIn 6s forwards;
      animation-delay: 4s;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="love top-left">I LOVE YOU</div>
    <div class="love top-right">I LOVE YOU</div>
    <div class="love bottom-left">I LOVE YOU</div>
    <div class="love bottom-right">I LOVE YOU</div>
    <div class="name">MAMITO HELLEN</div>
  </div>
</body>
</html>
