<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glittering I LOVE YOU Heart</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    svg {
      width: 600px;
      height: 500px;
    }

    text {
      font-family: cursive;
      font-size: 22px;
      fill: red;
      filter: drop-shadow(0 0 6px pink);
    }

    /* Animate text along the path */
    textPath {
      animation: moveText 15s linear infinite;
    }

    @keyframes moveText {
      from { startOffset: 0%; }
      to   { startOffset: 100%; }
    }

    /* Glitter effect */
    @keyframes glitter {
      0% { fill: red; filter: drop-shadow(0 0 6px pink); }
      50% { fill: hotpink; filter: drop-shadow(0 0 12px white); }
      100% { fill: red; filter: drop-shadow(0 0 6px pink); }
    }

    text {
      animation: glitter 2s infinite alternate;
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 34px;
      font-family: cursive;
      color: white;
      text-shadow: 2px 2px 12px red;
      animation: fadeIn 4s ease-in-out forwards;
      animation-delay: 2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div style="position:relative;">
    <svg viewBox="0 0 600 500">
      <!-- Heart path -->
      <path id="heartPath" d="M300,450
        C150,300 80,180 180,100
        C300,20 400,20 520,100
        C620,180 550,300 400,450
        Z" fill="none" stroke="transparent"/>

      <!-- Flowing glittering text -->
      <text>
        <textPath href="#heartPath" startOffset="0%">
          💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖
        </textPath>
      </text>
    </svg>

    <!-- Name inside heart -->
    <div class="name">MAMITO HELLEN</div>
  </div>
</body>
</html>
