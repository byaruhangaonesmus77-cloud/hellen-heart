<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I LOVE YOU Heart Motion</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .heart-path {
      position: relative;
      width: 400px;
      height: 360px;
    }

    .love {
      position: absolute;
      font-family: cursive;
      font-size: 22px;
      color: red;
      text-shadow: 2px 2px 10px pink;
      animation: moveAlong 10s linear infinite;
    }

    /* Heart path defined with offsets */
    @keyframes moveAlong {
      0%   { top: 180px; left: 200px; transform: translate(-50%, -50%) rotate(0deg); }
      25%  { top: 40px; left: 100px; transform: translate(-50%, -50%) rotate(-45deg); }
      50%  { top: 40px; left: 300px; transform: translate(-50%, -50%) rotate(45deg); }
      75%  { top: 320px; left: 200px; transform: translate(-50%, -50%) rotate(180deg); }
      100% { top: 180px; left: 200px; transform: translate(-50%, -50%) rotate(360deg); }
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-family: cursive;
      color: white;
      text-shadow: 2px 2px 10px red;
      animation: fadeIn 4s ease-in-out forwards;
      animation-delay: 2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="heart-path">
    <!-- Multiple “I LOVE YOU” texts staggered -->
    <div class="love" style="animation-delay:0s;">I LOVE YOU</div>
    <div class="love" style="animation-delay:2.5s;">I LOVE YOU</div>
    <div class="love" style="animation-delay:5s;">I LOVE YOU</div>
    <div class="love" style="animation-delay:7.5s;">I LOVE YOU</div>
    <div class="name">MAMITO HELLEN</div>
  </div>
</body>
</html>
