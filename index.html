<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I LOVE YOU Heart Flow</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    svg {
      width: 500px;
      height: 450px;
    }

    text {
      font-family: cursive;
      font-size: 22px;
      fill: red;
      filter: drop-shadow(0 0 6px pink);
    }

    textPath {
      animation: moveText 12s linear infinite;
    }

    @keyframes moveText {
      from { startOffset: 0%; }
      to   { startOffset: 100%; }
    }

    /* Glitter effect */
    @keyframes glitter {
      0% { fill: red; filter: drop-shadow(0 0 6px pink); }
      50% { fill: hotpink; filter: drop-shadow(0 0 12px white); }
      100% { fill: red; filter: drop-shadow(0 0 6px pink); }
    }

    text {
      animation: glitter 2s infinite alternate;
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-family: cursive;
      color: white;
      text-shadow: 2px 2px 12px red;
      animation: fadeIn 4s ease-in-out forwards;
      animation-delay: 2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div style="position:relative;">
    <svg viewBox="0 0 500 450">
      <!-- Heart path -->
      <path id="heartPath" d="M250,400
        C100,250 50,150 150,80
        C250,10 350,10 450,80
        C550,150 500,250 350,400
        Z" fill="none" stroke="transparent"/>

      <!-- Flowing text around heart -->
      <text>
        <textPath href="#heartPath" startOffset="0%">
          💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖
        </textPath>
      </text>
    </svg>

    <!-- Name inside heart -->
    <div class="name">MAMITO HELLEN</div>
  </div>
</body>
</html>
