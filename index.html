<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romantic Heart for MAMITO HELLEN</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 400px;
      height: 400px;
    }

    .love {
      position: absolute;
      font-family: cursive;
      font-size: 22px;
      color: red;
      text-shadow: 0 0 10px pink;
      animation: float 6s infinite alternate;
    }

    /* Place words roughly around a heart */
    .love:nth-child(1) { top: 20px; left: 160px; animation-delay: 0s; }
    .love:nth-child(2) { top: 60px; left: 80px; animation-delay: 1s; }
    .love:nth-child(3) { top: 60px; left: 240px; animation-delay: 2s; }
    .love:nth-child(4) { top: 120px; left: 40px; animation-delay: 3s; }
    .love:nth-child(5) { top: 120px; left: 280px; animation-delay: 4s; }
    .love:nth-child(6) { top: 200px; left: 60px; animation-delay: 5s; }
    .love:nth-child(7) { top: 200px; left: 260px; animation-delay: 6s; }
    .love:nth-child(8) { top: 280px; left: 140px; animation-delay: 7s; }

    @keyframes float {
      from { transform: scale(1) rotate(0deg); opacity: 0.7; }
      to { transform: scale(1.2) rotate(10deg); opacity: 1; }
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-family: cursive;
      color: white;
      text-shadow: 0 0 15px red;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px red; }
      to { text-shadow: 0 0 20px pink; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="love">I LOVE YOU</div>
    <div class="name">MAMITO HELLEN</div>
  </div>
</body>
</html>
