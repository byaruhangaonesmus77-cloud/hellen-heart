<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I LOVE YOU Heart Flow</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    svg {
      width: 500px;
      height: 450px;
    }

    text {
      font-family: cursive;
      font-size: 22px;
      fill: red;
      text-shadow: 2px 2px 8px pink;
    }

    /* Animate text along the path */
    textPath {
      animation: moveText 10s linear infinite;
    }

    @keyframes moveText {
      from { startOffset: 0%; }
      to   { startOffset: 100%; }
    }

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      font-family: cursive;
      color: white;
      text-shadow: 2px 2px 10px red;
      animation: fadeIn 4s ease-in-out forwards;
      animation-delay: 2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div style="position:relative;">
    <svg viewBox="0 0 500 450">
      <!-- Heart path -->
      <path id="heartPath" d="M250,400
        C100,250 50,150 150,80
        C250,10 350,10 450,80
        C550,150 500,250 350,400
        Z" fill="none" stroke="transparent"/>

      <!-- Flowing text -->
      <text>
        <textPath href="#heartPath" startOffset="0%">
          💖 I LOVE YOU 💖 I LOVE YOU 💖 I LOVE YOU 💖
